name: Update FIFA predictions

on:
  schedule:
    - cron: "0 13 * * 2,4,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update predictions
        run: node scripts/update_predictions.js

      - name: Commit updated artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/predictions.json predictions.md fifa-predictions.html index.html
          git diff --cached --quiet || git commit -m "Update FIFA predictions"
          git push
